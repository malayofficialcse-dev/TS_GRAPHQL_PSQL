type Product {
    id:ID!
    name:String!
    price:Float!
    category_id:ID
}

extend type Query {
    getProducts(limit: Int, offset: Int, search: String): [Product]
    getProductById(id:ID!):Product
}

extend type Mutation {
    createProduct(name:String!,price:Float!,category_id:ID):Product
    updateProduct(id:ID!,name:String!,price:Float!,category_id:ID):Product
    deleteProduct(id:ID!):Product
}
